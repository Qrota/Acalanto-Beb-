<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acalanto Bebê | Registro de Atendimento</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #eef0f4;
    --shadow-light: #ffffff;
    --shadow-dark: #c9ccd3;
    --accent: #f3a8a8;
    --text: #5a5f6a;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    background: linear-gradient(#fcd9d999, #a0dcff79),url("fundo08.png");
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* === CONTAINER === */

.container::before {
    content: "";
    position: absolute;

    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url("mae_bebe_contorno3.png");
    background-size: cover;
    background-position: center;

    opacity: 0.10;   /* controla apenas a imagem */

    z-index: 0;
}
.container * {
    position: relative;
    z-index: 1;
}
.container {
    width: 100%;
    max-width: 620px;
    padding: 30px 25px;
    border-radius: 10px;

    background: var(--bg);
    box-shadow: 
        12px 12px 25px var(--shadow-dark),
        -12px -12px 25px var(--shadow-light);

    position: relative;
}

/* === LOGO === */
.logo {
    text-align: center;
    margin-bottom: 40px;
}
.logo h1 {
    margin: 0;
    color: var(--accent);
    font-weight: 400;
}
.logo span {
    font-size: 14px;
    color: var(--text);
}

/* === CAMPOS === */
.select-wrapper {
    margin-top: 18px;
}
.select-wrapper label {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
    display: block;
}

/* INPUT NEUMORPHIC (AFUNDADO) */
select, input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: none;
    outline: none;
    font-size: 15px;
    color: var(--text);

    background: var(--bg);

    box-shadow:
        inset 6px 6px 12px var(--shadow-dark),
        inset -6px -6px 12px var(--shadow-light);

    appearance: none;
}

/* FOCO */
select:focus, input:focus {
    box-shadow:
        inset 4px 4px 10px var(--shadow-dark),
        inset -4px -4px 10px var(--shadow-light);
}

/* === BOTÕES === */
button {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    margin-top: 18px;
    cursor: pointer;

    background: var(--bg);
    color: var(--text);

    box-shadow:
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);

    transition: all 0.2s ease;
}

/* HOVER */
button:hover {
    transform: translateY(-2px);
}

/* CLIQUE (AFUNDADO) */
button:active {
    box-shadow:
        inset 4px 4px 10px var(--shadow-dark),
        inset -4px -4px 10px var(--shadow-light);
    transform: scale(0.97);
}

/* VARIAÇÕES */
.entrada {
    background: hsl(341, 68%, 90%);
    color: #e07a86;
}

.saida {
    background: #fcdfd2;
    color: #ff977d;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* === STATUS === */
#status {
    margin-top: 24px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
}
.loading { color: #888; }
.sucesso { color: #4caf50; }
.erro { color: #e74c3c; }

/* === INFO === */
.info {
    margin-top: 15px;
    font-size: 13px;
    text-align: center;
    color: var(--text);
}

/* === FOOTER === */
.footer {
    margin-top: 10px;
    text-align: center;
    font-size: 0.75rem;
    color: #999;
}
.footer-logo {
    display: block;
    margin: 18px auto 0;
    width: 32px;
    height: 24px;
    background: url('logo_acalantobebe1.png') center/contain no-repeat;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>Acalanto Bebê</h1>
        <span>Registro de Atendimento</span>
    </div>

    <div class="select-wrapper">
        <label>Nome da Profissional Parceira</label>
        <select id="nome">
            <option value="">— Selecione seu Nome —</option>
            <option value="Auricelia">Auricelia Gomes</option>
            <option value="Jociane">Jociane Batista</option>
            <option value="Sonia">Sonia Felix </option>
            <option value="Grazielle">Grazielle Pereira</option>
            <option value="Carla">Carla Cantanhede</option>
        </select>
    </div>

    <div class="select-wrapper">
        <label>Selecione o atendimento</label>
        <select id="cargo">
            <option value="">— Escolha o atendimento —</option>
            <option value="(Livia)-(Gabriel)">Mãe (Livia) - Bebê (Gabriel)</option>
            <option value="(Mariah)-(Gêmeos)">Mãe (Mariah) - Bebês (Gêmeos)</option>
            <option value="(Mariana)-(Antônio)">Mãe (Mariana) - Bebê (Antônio)</option>
        </select>
    </div>

    <button id="btnInicio" class="entrada" onclick="iniciarServico()">
        Iníciar Atendimento
    </button>

    <button id="btnFim" class="saida" onclick="finalizarServico()">
        Finalizar Atendimento
    </button>

    <div id="status"></div>

    <div class="info">
        Registro automático com data, hora e localização GPS
    </div>

    <div class="footer">
        Sistema interno • Acalanto Bebê
        <div class="footer-logo"></div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzvqdCRE_qLfGVbgeUTTEWkxAWPXoHvvUQ9uKUDevAt53V5cWASmRyAbEO_ufzjC88/exec";
let enviando = false;

function horaAtual() {
    return new Date().toLocaleString("pt-BR", { 
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit' 
    });
}

function registrar(tipo) {
    if (enviando) return;

    const nome = document.getElementById("nome").value;
    const cargo = document.getElementById("cargo").value;

    if (!nome) {
        alert("Por favor, digite seu nome");
        return;
    }
    if (!cargo) {
        alert("Selecione o atendimento");
        return;
    }

    const statusEl = document.getElementById("status");
    statusEl.className = "status loading";
    statusEl.innerHTML = "Obtendo localização GPS...";

    navigator.geolocation.getCurrentPosition(
        pos => {
            enviar(nome, cargo, tipo, pos.coords.latitude, pos.coords.longitude);
        },
        () => {
            statusEl.className = "status erro";
            statusEl.innerHTML = "⚠ Ative o GPS para registrar o atendimento";
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

function enviar(nome, cargo, tipo, lat, lon) {
    enviando = true;
    const statusEl = document.getElementById("status");
    statusEl.className = "status loading";
    statusEl.innerHTML = "Salvando registro...";

    fetch(API, {
        method: "POST",
        body: JSON.stringify({
            nome: nome,
            cargo: cargo,
            tipo: tipo,
            data: horaAtual(),
            lat: lat,
            lon: lon
        })
    })
    .then(r => r.text())
    .then(() => {
        statusEl.className = "status sucesso";
        statusEl.innerHTML = tipo === "Início" 
            ? "✔ Serviço iniciado com sucesso!" 
            : "✔ Serviço finalizado com sucesso!";

        enviando = false;
        setTimeout(() => { statusEl.innerHTML = ""; }, 5000);
    })
    .catch(() => {
        statusEl.className = "status erro";
        statusEl.innerHTML = "❌ Erro ao salvar. Tente novamente.";
        enviando = false;
    });
}

function iniciarServico() {
    if (confirm("Desejamos um excelente atendimento! Confirma o início do serviço agora?")) {
        registrar("Início");
    }
}

function finalizarServico() {
    if (confirm("Parabéns por mais um atendimento realizado com sucesso! Confirma a finalização do serviço agora?")) {
        registrar("Fim");
    }
}

/* Fullscreen */
function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent); }
function entrarFullscreen() {
    if (isIOS()) return;
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
}
document.body.addEventListener("click", entrarFullscreen, { once: true });
</script>
</body>
</html>
