<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#f7d2d2">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Acalanto Bebê | Registro de Atendimento</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-gradient: linear-gradient(135deg, #fcd9d9 0%, #a0dcff 100%);
    --primary: #f7d2d2;
    --text: #474646;
    --rosa-forte: #ff6fb7;
    --shadow-light: rgba(255, 255, 255, 0.5);
    --shadow-dark: rgba(0, 0, 0, 0.05);
    
    --btn-entrada-bg: #f7d4df;
    --btn-entrada-text: #8a414a;
    --btn-saida-bg: #fcdfd2;
    --btn-saida-text: #8c4231;
    --disabled-bg: rgba(224, 229, 236, 0.5);
    --disabled-text: #a3b1c6;
}

/* RESET */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
}

body {
    margin: 0;
    background: var(--bg-gradient); /* Gradiente agora fica no fundo total */
    background-attachment: fixed;
    height: 100dvh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efeito de imagem de fundo fixo atrás do vidro */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("mae_bebe_contorno3.png") center/cover no-repeat;
    opacity: 0.1;
    z-index: -1;
}

/* === CONTAINER (O CARD PRINCIPAL) === */
.container {
    width: 100%;
    height: 100dvh;
    padding: 24px 18px;
    
    /* Efeito Glassmorphism no fundo principal */
    background: linear-gradient(135deg, rgba(253, 200, 200, 0.6), rgba(160, 220, 255, 0.582));
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);

    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;

    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

.container::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url("mae_bebe_contorno3.png");
    background-size: cover;
    background-position: center;
    opacity: 0.08;
    z-index: 0;
}

.container * {
    position: relative;
    z-index: 1;
}

/* === LOGO === */
.logo {
    text-align: center;
    margin-bottom: 20px;
}
.logo h1 {
    margin: 0;
    color: #ffffff;
    font-weight: 300;
    letter-spacing: 1px;
}
.logo span {
    font-size: 14px;
    color: var(--text);
}

/* === CAMPOS === */
.select-wrapper {
    margin-top: 15px;
}
.select-wrapper label {
    display: block;
    font-size: 12px;
    color: #525050;
    margin-bottom: 6px;
    font-weight: 400;
}

/* INPUTS COM TOQUE DE VIDRO */
select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ffffff;
    outline: none;
    font-size: 16px;
    color: var(--text);
    background: #ffffff3d;

    box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);

    transition: 0.2s;
}

/* === BOTÕES === */
button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    font-size: 16px;
    font-weight: 700;
    margin-top: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.entrada {
    background: rgba(247, 212, 223, 0.8);
    color: var(--btn-entrada-text);
}

.saida {
    background: rgba(252, 223, 210, 0.8);
    color: var(--btn-saida-text);
}

/* ESTADO ATIVO */
.entrada.ativo {
    background: #ff8fb1;
    color: #fff;
    box-shadow: 0 4px 15px rgba(255, 143, 177, 0.4);
}

.saida.ativo {
    background: #fca67b;
    color: #fff;
    box-shadow: 0 4px 15px rgba(252, 166, 123, 0.4);
}

button:disabled {
    opacity: 0.5;
    background: var(--disabled-bg) !important;
    color: var(--disabled-text) !important;
    cursor: not-allowed;
    transform: none !important;
}

button:active:not(:disabled) {
    transform: scale(0.98);
}

/* === STATUS E INFO === */
#status {
    height: 20px;
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
}
.loading { color: #666; }
.sucesso { color: #2e7d32; }
.erro { color: #c62828; }

.info {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    color: #666;
    font-style: italic;
}

/* === FOOTER === */
.footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: #5c5b5b;
}
.footer-logo {
    display: block;
    margin: 10px auto 0;
    width: 40px;
    height: 30px;
    background: url('logo_acalantobebe1.png') center/contain no-repeat;
    opacity: 0.6;
}

/* Ajustes para telas muito pequenas */
@media (max-height: 660px) {
    .container { padding: 15px; min-height: 95dvh; }
    .logo { margin-bottom: 10px; }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>Acalanto Bebê</h1>
        <span>Registro de Atendimento</span>
    </div>

    <div class="select-wrapper">
        <label for="nome">Profissional Parceira</label>
        <select id="nome">
            <option value="">— Selecione —</option>
            <option value="Auricelia">Auricelia Gomes</option>
            <option value="Jociane">Jociane Batista</option>
            <option value="Sonia">Sonia Felix </option>
            <option value="Grazielle">Grazielle Pereira</option>
            <option value="Carla">Carla Cantanhede</option>
        </select>
    </div>

    <div class="select-wrapper">
        <label for="cargo">Atendimento</label>
        <select id="cargo">
            <option value="">— Selecione —</option>
            <option value="(Livia)-(Gabriel)">Mãe (Livia) - Bebê (Gabriel)</option>
            <option value="(Mariah)-(Gêmeos)">Mãe (Mariah) - Bebês (Gêmeos)</option>
            <option value="(Mariana)-(Antônio)">Mãe (Mariana) - Bebê (Antônio)</option>
        </select>
    </div>

    <button id="btnInicio" class="entrada" onclick="iniciarServico()">
        Iníciar Atendimento
    </button>

    <button id="btnFim" class="saida" onclick="finalizarServico()">
        Finalizar Atendimento
    </button>

    <div id="status" aria-live="polite"></div>

    <div class="info">
        Registro automático com GPS e horário oficial.
    </div>

    <div class="footer">
        Sistema interno • Acalanto Bebê
        <div class="footer-logo"></div>
    </div>
</div>


<script>
const API = "https://script.google.com/macros/s/AKfycbzvqdCRE_qLfGVbgeUTTEWkxAWPXoHvvUQ9uKUDevAt53V5cWASmRyAbEO_ufzjC88/exec";
const STORAGE_KEY = "acalanto_estado";

const doc = document;
const btnIniciar = doc.getElementById('btnInicio');
const btnFinalizar = doc.getElementById('btnFim');
const campoNome = doc.getElementById("nome");
const campoCargo = doc.getElementById("cargo");
const statusEl = doc.getElementById("status");

let enviando = false;

// 🔹 CONFIG GPS OTIMIZADA
const GEO_OPTIONS = {
    enableHighAccuracy: false,
    timeout: 20000,
    maximumAge: 60000
};

// 🔹 SALVAR ESTADO
function salvarEstado() {
    const estado = {
        nome: campoNome.value,
        cargo: campoCargo.value,
        emAtendimento: !btnFinalizar.disabled
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
}

// 🔹 RESTAURAR ESTADO
function restaurarEstado() {
    try {
        const dados = localStorage.getItem(STORAGE_KEY);
        if (!dados) return setupEstadoInicial();

        const estado = JSON.parse(dados);
        campoNome.value = estado.nome || "";
        campoCargo.value = estado.cargo || "";

        if (estado.emAtendimento) {
            setModoAtendimento(true);
        } else {
            setupEstadoInicial();
            validarCampos();
        }
    } catch {
        setupEstadoInicial();
    }
}

// 🔹 ESTADO UI
function setModoAtendimento(ativo) {
    btnIniciar.disabled = ativo;
    btnIniciar.classList.toggle("ativo", !ativo);
    btnFinalizar.disabled = !ativo;
    btnFinalizar.classList.toggle("ativo", ativo);
}

function setupEstadoInicial() {
    btnFinalizar.disabled = true;
    btnIniciar.classList.add("ativo");
}

// 🔹 VALIDAÇÃO
function validarCampos() {
    const ok = campoNome.value && campoCargo.value;
    if (btnFinalizar.disabled) {
        btnIniciar.disabled = !ok;
    }
}

// 🔹 HORA
function horaAtual() {
    return new Date().toLocaleString("pt-BR");
}

// 🔹 GPS COM RETRY + FALLBACK
function obterLocalizacao() {
    return new Promise((resolve) => {
        let tentou = false;

        function tentar() {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    });
                },
                err => {
                    console.warn("Erro GPS:", err.code);

                    if (!tentou) {
                        tentou = true;
                        setTimeout(tentar, 3000); // retry
                    } else {
                        resolve({ lat: null, lon: null }); // fallback
                    }
                },
                GEO_OPTIONS
            );
        }

        tentar();
    });
}

// 🔹 ENVIO COM RETRY
async function enviarComRetry(payload, tentativas = 2) {
    try {
        await fetch(API, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        return true;
    } catch (e) {
        if (tentativas > 0) {
            await new Promise(r => setTimeout(r, 2000));
            return enviarComRetry(payload, tentativas - 1);
        }
        return false;
    }
}

// 🔹 REGISTRO PRINCIPAL
async function registrar(tipo) {
    if (enviando) return;

    const nome = campoNome.value;
    const cargo = campoCargo.value;

    if (!nome || !cargo) {
        alert("Preencha todos os campos.");
        return;
    }

    enviando = true;

    statusEl.className = "status loading";
    statusEl.innerHTML = "📍 Obtendo localização...";

    const { lat, lon } = await obterLocalizacao();

    statusEl.innerHTML = lat
        ? "📡 Localização obtida. Salvando..."
        : "⚠ Sem GPS. Salvando mesmo assim...";

    const sucesso = await enviarComRetry({
        nome,
        cargo,
        tipo,
        data: horaAtual(),
        lat,
        lon
    });

    if (sucesso) {
        statusEl.className = "status sucesso";
        statusEl.innerHTML = tipo === "Início"
            ? "✔ Atendimento iniciado!"
            : "✔ Atendimento finalizado!";

        if (tipo === "Início") {
            setModoAtendimento(true);
        } else {
            setModoAtendimento(false);
            campoNome.value = "";
            campoCargo.value = "";
            localStorage.removeItem(STORAGE_KEY);
            validarCampos();
        }

        salvarEstado();
    } else {
        statusEl.className = "status erro";
        statusEl.innerHTML = "❌ Erro ao enviar. Tente novamente.";
    }

    enviando = false;
}

// 🔹 AÇÕES
function iniciarServico() {
    if (confirm("Confirma o início do atendimento?")) {
        registrar("Início");
    }
}

function finalizarServico() {
    if (confirm("Confirma a finalização?")) {
        registrar("Fim");
    }
}

// 🔹 FULLSCREEN
function entrarFullscreen() {
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) return;
    document.documentElement.requestFullscreen?.();
}

// 🔹 INIT
doc.addEventListener('DOMContentLoaded', () => {
    restaurarEstado();

    campoNome.addEventListener('input', () => {
        validarCampos();
        salvarEstado();
    });

    campoCargo.addEventListener('change', () => {
        validarCampos();
        salvarEstado();
    });

    doc.body.addEventListener("click", entrarFullscreen, { once: true });

    // 🔥 PRÉ-AQUECER GPS
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(() => {}, () => {});
    }

    // 🔹 SW
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(r => console.log("SW OK:", r.scope))
            .catch(e => console.log("SW erro:", e));
    }
});
</script>

</body>
</html>
