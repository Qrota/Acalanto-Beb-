<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#f7d2d2">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Acalanto Bebê | Registro de Atendimento</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0f4f8;
    --primary: #f7d2d2;
    --text: #474646;
    --rosa-forte: #ff6fb7;
    --shadow-light: #ffffff;
    --shadow-dark: #d1d9e6;
    
    /* Novas variáveis para melhor contraste */
    --btn-entrada-bg: #f7d4df;
    --btn-entrada-text: #8a414a; /* Tom mais escuro para leitura */
    --btn-saida-bg: #fcdfd2;
    --btn-saida-text: #8c4231;   /* Tom mais escuro para leitura */
    --disabled-bg: #e0e5ec;
    --disabled-text: #a3b1c6;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
}

body {
    background: #ffffff;
    height: 100dvh;
    width: 100%;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
}

/* === CONTAINER === */

.container::before {
    content: "";
    position: absolute;

    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url("mae_bebe_contorno3.png");
    background-size: cover;
    background-position: center;

    opacity: 0.07;   /* controla apenas a imagem */

    z-index: 0;
}
.container * {
    position: relative;
    z-index: 1;
}
.container {
    width: 100%;
    height: 100dvh; /* ocupa tela inteira */

    padding: 24px 18px;

    border-radius: 0; /* remove efeito card */

    background: linear-gradient(#ffc5c5, #83cffc);

    box-shadow: none; /* remove sombra de card */

    position: relative;

    display: flex;
    flex-direction: column;
    justify-content: center;

    /* SAFE AREA (notch iPhone) */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* === LOGO === */
.logo {
    text-align: center;
    margin-bottom: 40px;
}
.logo h1 {
    margin: 0;
    color: #ffffff;
    font-weight: 300;
}
.logo span {
    font-size: 14px;
    color: var(--text);
}

/* === CAMPOS === */
.select-wrapper {
    margin-top: 18px;
}
.select-wrapper label {
    display: block;
    font-size: 12px;
    color: #525050;
    margin-bottom: 6px;
    font-weight: 400;
}

/* INPUT NEUMORPHIC (AFUNDADO) */
select, input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #ffffff;
    outline: none;
    font-size: 16px;
    color: var(--text);
    background: #ffffff15;

    box-shadow: 
        inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);

    transition: 0.2s;
}

select:focus, input:focus {
    box-shadow: 
        inset 2px 2px 5px var(--shadow-dark),
        inset -2px -2px 5px var(--shadow-light);
}

/* === BOTÕES === */
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #ffffff;
    font-size: 16px;
    font-weight: 600;
    margin-top: 18px;
    cursor: pointer;

    background: var(--bg);
    color: var(--text);

    box-shadow:
        6px 6px 12px var(--shadow-dark),
        -6px -6px 12px #888;

    transition: all 0.2s ease;
}
/* ESTADO DESATIVADO VISUAL */
button:disabled {
    background: var(--disabled-bg) !important;
    color: var(--disabled-text) !important;
    box-shadow: none !important;
    transform: none !important;
    opacity: 0.7; /* Consistência visual para desabilitado */
    cursor: not-allowed;
}

/* ESTADO ATIVO FORTE */
.entrada.ativo {
    background: #ff8fb1 ;
    color: #fff;
}

.saida.ativo {
    background: linear-gradient(135deg, #f8bda2, #ff9148);
    color: #fff;
}

/* HOVER */
button:hover:not(:disabled) {
    transform: translateY(-2px);
}

/* CLIQUE (AFUNDADO) */
button:active:not(:disabled) {
    box-shadow:
        inset 4px 4px 10px var(--shadow-dark),
        inset -4px -4px 10px var(--shadow-light);
    transform: scale(0.97);
}

/* VARIAÇÕES */
.entrada {
    background: var(--btn-entrada-bg);
    color: var(--btn-entrada-text);
}

.saida {
    background: var(--btn-saida-bg);
    color: var(--btn-saida-text);
}

/* === STATUS === */
#status {
    margin-top: 50px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
}
.loading { color: #888; }
.sucesso { color: #4caf50; }
.erro { color: #e74c3c; }

/* === INFO === */
.info {
    margin-top: 15px;
    font-size: 13px;
    text-align: center;
    color: var(--text);
    font-style: italic;

}

/* === FOOTER === */
.footer {
    margin-top: 10px;
    text-align: center;
    font-size: 0.75rem;
    color: #5c5b5b;
}
.footer-logo {
    display: block;
    margin: 18px auto 0;
    width: 32px;
    height: 24px;
    background: url('logo_acalantobebe1.png') center/contain no-repeat;
    opacity: 0.8;
}
/* MELHOR USO EM TELAS ALTAS */
@media (min-height: 700px) {
    .container {
        justify-content: center;
    }
}

/* TELAS PEQUENAS */
@media (max-height: 600px) {
    .container {
        justify-content: flex-start;
        padding-top: 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>Acalanto Bebê</h1>
        <span>Registro de Atendimento</span>
    </div>

    <div class="select-wrapper">
        <label for="nome">Nome da Profissional Parceira</label>
        <select id="nome">
            <option value="">— Selecione —</option>
            <option value="Auricelia">Auricelia Gomes</option>
            <option value="Jociane">Jociane Batista</option>
            <option value="Sonia">Sonia Felix </option>
            <option value="Grazielle">Grazielle Pereira</option>
            <option value="Carla">Carla Cantanhede</option>
        </select>
    </div>

    <div class="select-wrapper">
        <label for="cargo">Selecione o atendimento</label>
        <select id="cargo">
            <option value="">— Selecione —</option>
            <option value="(Livia)-(Gabriel)">Mãe (Livia) - Bebê (Gabriel)</option>
            <option value="(Mariah)-(Gêmeos)">Mãe (Mariah) - Bebês (Gêmeos)</option>
            <option value="(Mariana)-(Antônio)">Mãe (Mariana) - Bebê (Antônio)</option>
        </select>
    </div>

    <button id="btnInicio" class="entrada" onclick="iniciarServico()">
        Iníciar Atendimento
    </button>

    <button id="btnFim" class="saida" onclick="finalizarServico()">
        Finalizar Atendimento
    </button>

    <div id="status" aria-live="polite"></div>

    <div class="info">
        Registro automático com GPS e horário oficial.
    </div>

    <div class="footer">
        Sistema interno • Acalanto Bebê
        <div class="footer-logo"></div>
    </div>
</div>
<script>
const API = "https://script.google.com/macros/s/AKfycbzvqdCRE_qLfGVbgeUTTEWkxAWPXoHvvUQ9uKUDevAt53V5cWASmRyAbEO_ufzjC88/exec";
const STORAGE_KEY = "acalanto_estado";

// 🔹 Seleção e Cache de Elementos
const doc = document;
const btnIniciar = doc.getElementById('btnInicio');
const btnFinalizar = doc.getElementById('btnFim');
const campoNome = doc.getElementById("nome");
const campoCargo = doc.getElementById("cargo");
const statusEl = doc.getElementById("status");

let enviando = false;

// 🔹 SALVAR ESTADO
function salvarEstado() {
    const estado = {
        nome: campoNome.value,
        cargo: campoCargo.value,
        emAtendimento: !btnFinalizar.disabled
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
}

// 🔹 RESTAURAR ESTADO
function restaurarEstado() {
    try {
        const dados = localStorage.getItem(STORAGE_KEY);
        if (!dados) {
            setupEstadoInicial();
            return;
        }

        const estado = JSON.parse(dados);
        campoNome.value = estado.nome || "";
        campoCargo.value = estado.cargo || "";

        if (estado.emAtendimento) {
            setModoAtendimento(true);
        } else {
            setupEstadoInicial();
            validarCampos();
        }
    } catch (e) {
        console.error("Erro ao restaurar estado:", e);
        setupEstadoInicial();
    }
}

// 🔹 AUXILIARES DE ESTADO
function setModoAtendimento(ativo) {
    btnIniciar.disabled = ativo;
    btnIniciar.classList.toggle("ativo", !ativo);
    btnFinalizar.disabled = !ativo;
    btnFinalizar.classList.toggle("ativo", ativo);
}

function setupEstadoInicial() {
    btnFinalizar.disabled = true;
    btnFinalizar.classList.remove("ativo");
    btnIniciar.classList.add("ativo");
}

// 🔹 VALIDAÇÃO
function validarCampos() {
    const camposOk = campoNome.value.trim() !== "" && campoCargo.value !== "";
    // Só habilita o Início se campos estiverem OK e NÃO estiver em atendimento
    if (btnFinalizar.disabled) {
        btnIniciar.disabled = !camposOk;
    }
}

// 🔹 HORA
function horaAtual() {
    return new Date().toLocaleString("pt-BR", { 
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit' 
    });
}

// 🔹 REGISTRO
function registrar(tipo) {
    if (enviando) return;

    const nome = campoNome.value;
    const cargo = campoCargo.value;

    if (!nome || !cargo) {
        alert("Por favor, preencha todos os campos antes de prosseguir.");
        return;
    }

    statusEl.className = "status loading";
    statusEl.innerHTML = "Obtendo localização GPS...";

    navigator.geolocation.getCurrentPosition(
        pos => {
            // ✅ Com GPS
            enviar(nome, cargo, tipo, pos.coords.latitude, pos.coords.longitude);
        },
        error => {
            console.warn("GPS indisponível:", error);

            // ✅ Sem GPS (fallback)
            statusEl.className = "status aviso";
            statusEl.innerHTML = "⚠ GPS indisponível. Registrando sem localização...";

            // envia com null (ou você pode usar 0,0 se preferir)
            enviar(nome, cargo, tipo, null, null);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}

// 🔹 ENVIO
async function enviar(nome, cargo, tipo, lat, lon) {
    enviando = true;
    statusEl.className = "status loading";
    statusEl.innerHTML = "Salvando registro...";

    try {
        await fetch(API, {
            method: "POST",
            body: JSON.stringify({
                nome, cargo, tipo,
                data: horaAtual(),
                lat, lon
            })
        });

        // Como não havia tratamento específico do corpo da resposta no original, assumimos sucesso ao resolver a promessa
        statusEl.className = "status sucesso";
        statusEl.innerHTML = tipo === "Início" 
            ? "✔ Serviço iniciado com sucesso!" 
            : "✔ Serviço finalizado com sucesso!";

        if (tipo === "Início") {
            setModoAtendimento(true);
        } else {
            setModoAtendimento(false);
            campoNome.value = "";
            campoCargo.value = "";
            localStorage.removeItem(STORAGE_KEY);
            validarCampos();
        }

        salvarEstado();
        setTimeout(() => { statusEl.innerHTML = ""; }, 5000);
    } catch (error) {
        console.error("Erro no envio:", error);
        statusEl.className = "status erro";
        statusEl.innerHTML = "❌ Erro ao salvar. Verifique sua conexão.";
    } finally {
        enviando = false;
    }
}

// 🔹 AÇÕES
function iniciarServico() {
    if (confirm("Desejamos um excelente atendimento! Confirma o início do serviço agora?")) {
        registrar("Início");
    }
}

function finalizarServico() {
    if (confirm("Parabéns por mais um atendimento realizado com sucesso! Confirma a finalização do serviço agora?")) {
        registrar("Fim");
    }
}

// 🔹 PWA & FULLSCREEN
function entrarFullscreen() {
    if (/iPad|iPhone|iPod/.test(navigator.userAgent)) return;
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
}

// Inicialização
doc.addEventListener('DOMContentLoaded', () => {
    restaurarEstado();

    campoNome.addEventListener('input', () => { validarCampos(); salvarEstado(); });
    campoCargo.addEventListener('change', () => { validarCampos(); salvarEstado(); });
    doc.body.addEventListener("click", entrarFullscreen, { once: true });

    // Registro do Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registrado:', reg.scope))
            .catch(err => console.log('Erro ao registrar Service Worker:', err));
    }
});

</script>
</body>
</html>
